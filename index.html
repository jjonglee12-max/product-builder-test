<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행운의 로또 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
    <!-- 한국어 폰트 아기자기한 Jua체와 깔끔한 Noto Sans 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">🌙 다크 모드</button>
    </div>
    <div class="container">
        <h1>✨ 행운의 로또 번호 ✨</h1>
        <p class="subtitle">이번 주 1등은 바로 당신! 기운을 모아보세요!</p>
        
        <div class="lotto-balls" id="result-container">
            <!-- 초기 빈 상태 -->
            <div class="ball placeholder">?</div>
            <div class="ball placeholder">?</div>
            <div class="ball placeholder">?</div>
            <div class="ball placeholder">?</div>
            <div class="ball placeholder">?</div>
            <div class="ball placeholder">?</div>
        </div>
        
        <button id="draw-btn" class="draw-btn">번호 뽑기! 🎲</button>
    </div>

    <!-- 제휴 문의 섹션 추가 -->
    <div class="container contact-container">
        <h2>🤝 제휴 및 비즈니스 문의</h2>
        <p class="subtitle">함께 멋진 미래를 만들어가요!</p>
        
        <form action="https://formspree.io/f/xojyvzoq" method="POST" class="contact-form">
            <div class="input-group">
                <label for="name">성함/기업명</label>
                <input type="text" name="name" id="name" placeholder="홍길동" required>
            </div>
            <div class="input-group">
                <label for="email">이메일 주소</label>
                <input type="email" name="_replyto" id="email" placeholder="example@email.com" required>
            </div>
            <div class="input-group">
                <label for="message">문의 내용</label>
                <textarea name="message" id="message" rows="4" placeholder="문의 내용을 입력해 주세요." required></textarea>
            </div>
            <button type="submit" class="submit-btn">문의 보내기 ✉️</button>
        </form>
    </div>
    
    <!-- 댓글 섹션 추가 -->
    <div class="container">
        <h2 style="font-family: 'Jua', sans-serif; font-size: 2.2rem; margin-bottom: 20px;">💬 방명록 및 댓글</h2>
        <div id="disqus_thread"></div>
        <script>
            /**
            *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
            *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */

            var disqus_config = function () {
            this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
            this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
            };
            */
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://product-builder-test.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
